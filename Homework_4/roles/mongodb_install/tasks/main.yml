---
- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Install prerequisite packages
  apt:
    name:
      - gnupg
      - curl
      - python3-pymongo
    state: present

- name: Disable Transparent Huge Pages (THP)
  copy:
    dest: /etc/systemd/system/disable-thp.service
    content: |
      [Unit]
      Description=Disable THP
      [Service]
      Type=oneshot
      ExecStart=/bin/sh -c 'echo never > /sys/kernel/mm/transparent_hugepage/enabled'
      [Install]
      WantedBy=multi-user.target
  notify: enable disable-thp

- name: Configure system limits for MongoDB
  copy:
    dest: /etc/security/limits.d/mongodb.conf
    content: |
      mongod soft nofile 64000
      mongod hard nofile 64000
      mongod soft nproc 64000
      mongod hard nproc 64000

- name: Import MongoDB GPG key
  apt_key:
    url: "https://pgp.mongodb.com/server-{{ mongodb_version }}.asc"
    state: present

- name: Add MongoDB APT repository
  apt_repository:
    repo: "deb [ arch=amd64 ] https://repo.mongodb.org/apt/ubuntu jammy/mongodb-org/{{ mongodb_version }} multiverse"
    state: present
    filename: "mongodb-org-{{ mongodb_version }}"

- name: Install MongoDB packages
  apt:
    name: mongodb-org
    state: present
    update_cache: yes

- name: Deploy mongod.conf from template
  template:
    src: mongod.conf.j2
    dest: /etc/mongod.conf
    owner: root
    group: root
    mode: '0644'
  notify: restart mongod

- name: Ensure data directory exists
  file:
    path: "{{ mongodb_data_dir }}"
    state: directory
    owner: mongodb
    group: mongodb
    mode: '0755'

- name: Start and enable mongod service
  systemd:
    name: mongod
    state: started
    enabled: yes
    daemon_reload: yes

- name: Wait for MongoDB to be ready
  wait_for:
    port: "{{ mongodb_port }}"
    delay: 5
    timeout: 60
