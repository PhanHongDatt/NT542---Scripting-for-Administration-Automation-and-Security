# ============================================================
# NETWORK INVENTORY — CLOS 5-Stage (3-Tier) Topology
# Được tạo tự động từ file: clos02-light.clab.yml
# ============================================================
# Quy ước IP:
#   Superspine:  10.0.0.x/32  (loopback)
#   Spine:       10.0.1.x/32  (loopback)
#   Leaf:        10.0.2.x/32  (loopback)
#   Client:      192.168.x.10/24
#   P2P links:   10.1.POD.x/30
# ============================================================

credentials:
  default:
    username: admin
    password_env: NETWORK_PASSWORD   # Lấy từ biến môi trường, KHÔNG hardcode
    ssh_port: 22

devices:
  # ========== SUPERSPINE LAYER (3) ==========
  superspine1:
    hostname: superspine1
    mgmt_ip: "clab-clos02-light-superspine1"   # Docker DNS trong containerlab
    role: superspine
    tier: 3
    device_type: linux                          # FRRouting trên Linux
    loopback: "10.0.0.1/32"
    interfaces:
      eth1: { peer: spine1, peer_intf: eth3, ip: "10.1.100.1/30" }
      eth2: { peer: spine2, peer_intf: eth3, ip: "10.1.100.5/30" }
      eth3: { peer: spine3, peer_intf: eth3, ip: "10.1.100.9/30" }
      eth4: { peer: spine4, peer_intf: eth3, ip: "10.1.100.13/30" }
      eth5: { peer: spine5, peer_intf: eth3, ip: "10.1.100.17/30" }
      eth6: { peer: spine6, peer_intf: eth3, ip: "10.1.100.21/30" }

  superspine2:
    hostname: superspine2
    mgmt_ip: "clab-clos02-light-superspine2"
    role: superspine
    tier: 3
    device_type: linux
    loopback: "10.0.0.2/32"
    interfaces:
      eth1: { peer: spine1, peer_intf: eth4, ip: "10.1.101.1/30" }
      eth2: { peer: spine2, peer_intf: eth4, ip: "10.1.101.5/30" }
      eth3: { peer: spine3, peer_intf: eth4, ip: "10.1.101.9/30" }
      eth4: { peer: spine4, peer_intf: eth4, ip: "10.1.101.13/30" }
      eth5: { peer: spine5, peer_intf: eth4, ip: "10.1.101.17/30" }
      eth6: { peer: spine6, peer_intf: eth4, ip: "10.1.101.21/30" }

  superspine3:
    hostname: superspine3
    mgmt_ip: "clab-clos02-light-superspine3"
    role: superspine
    tier: 3
    device_type: linux
    loopback: "10.0.0.3/32"
    interfaces:
      eth1: { peer: spine1, peer_intf: eth5, ip: "10.1.102.1/30" }
      eth2: { peer: spine2, peer_intf: eth5, ip: "10.1.102.5/30" }
      eth3: { peer: spine3, peer_intf: eth5, ip: "10.1.102.9/30" }
      eth4: { peer: spine4, peer_intf: eth5, ip: "10.1.102.13/30" }
      eth5: { peer: spine5, peer_intf: eth5, ip: "10.1.102.17/30" }
      eth6: { peer: spine6, peer_intf: eth5, ip: "10.1.102.21/30" }

  # ========== SPINE LAYER — POD 1 (2) ==========
  spine1:
    hostname: spine1
    mgmt_ip: "clab-clos02-light-spine1"
    role: spine
    tier: 2
    pod: 1
    device_type: linux
    loopback: "10.0.1.1/32"
    interfaces:
      eth1: { peer: leaf1,       peer_intf: eth1, ip: "10.1.1.1/30" }
      eth2: { peer: leaf2,       peer_intf: eth1, ip: "10.1.1.5/30" }
      eth3: { peer: superspine1, peer_intf: eth1, ip: "10.1.100.2/30" }
      eth4: { peer: superspine2, peer_intf: eth1, ip: "10.1.101.2/30" }
      eth5: { peer: superspine3, peer_intf: eth1, ip: "10.1.102.2/30" }

  spine2:
    hostname: spine2
    mgmt_ip: "clab-clos02-light-spine2"
    role: spine
    tier: 2
    pod: 1
    device_type: linux
    loopback: "10.0.1.2/32"
    interfaces:
      eth1: { peer: leaf1,       peer_intf: eth2, ip: "10.1.1.9/30" }
      eth2: { peer: leaf2,       peer_intf: eth2, ip: "10.1.1.13/30" }
      eth3: { peer: superspine1, peer_intf: eth2, ip: "10.1.100.6/30" }
      eth4: { peer: superspine2, peer_intf: eth2, ip: "10.1.101.6/30" }
      eth5: { peer: superspine3, peer_intf: eth2, ip: "10.1.102.6/30" }

  # ========== SPINE LAYER — POD 2 (2) ==========
  spine3:
    hostname: spine3
    mgmt_ip: "clab-clos02-light-spine3"
    role: spine
    tier: 2
    pod: 2
    device_type: linux
    loopback: "10.0.1.3/32"
    interfaces:
      eth1: { peer: leaf3,       peer_intf: eth1, ip: "10.1.2.1/30" }
      eth2: { peer: leaf4,       peer_intf: eth1, ip: "10.1.2.5/30" }
      eth3: { peer: superspine1, peer_intf: eth3, ip: "10.1.100.10/30" }
      eth4: { peer: superspine2, peer_intf: eth3, ip: "10.1.101.10/30" }
      eth5: { peer: superspine3, peer_intf: eth3, ip: "10.1.102.10/30" }

  spine4:
    hostname: spine4
    mgmt_ip: "clab-clos02-light-spine4"
    role: spine
    tier: 2
    pod: 2
    device_type: linux
    loopback: "10.0.1.4/32"
    interfaces:
      eth1: { peer: leaf3,       peer_intf: eth2, ip: "10.1.2.9/30" }
      eth2: { peer: leaf4,       peer_intf: eth2, ip: "10.1.2.13/30" }
      eth3: { peer: superspine1, peer_intf: eth4, ip: "10.1.100.14/30" }
      eth4: { peer: superspine2, peer_intf: eth4, ip: "10.1.101.14/30" }
      eth5: { peer: superspine3, peer_intf: eth4, ip: "10.1.102.14/30" }

  # ========== SPINE LAYER — POD 3 (2) ==========
  spine5:
    hostname: spine5
    mgmt_ip: "clab-clos02-light-spine5"
    role: spine
    tier: 2
    pod: 3
    device_type: linux
    loopback: "10.0.1.5/32"
    interfaces:
      eth1: { peer: leaf5,       peer_intf: eth1, ip: "10.1.3.1/30" }
      eth2: { peer: leaf6,       peer_intf: eth1, ip: "10.1.3.5/30" }
      eth3: { peer: superspine1, peer_intf: eth5, ip: "10.1.100.18/30" }
      eth4: { peer: superspine2, peer_intf: eth5, ip: "10.1.101.18/30" }
      eth5: { peer: superspine3, peer_intf: eth5, ip: "10.1.102.18/30" }

  spine6:
    hostname: spine6
    mgmt_ip: "clab-clos02-light-spine6"
    role: spine
    tier: 2
    pod: 3
    device_type: linux
    loopback: "10.0.1.6/32"
    interfaces:
      eth1: { peer: leaf5,       peer_intf: eth2, ip: "10.1.3.9/30" }
      eth2: { peer: leaf6,       peer_intf: eth2, ip: "10.1.3.13/30" }
      eth3: { peer: superspine1, peer_intf: eth6, ip: "10.1.100.22/30" }
      eth4: { peer: superspine2, peer_intf: eth6, ip: "10.1.101.22/30" }
      eth5: { peer: superspine3, peer_intf: eth6, ip: "10.1.102.22/30" }

  # ========== LEAF LAYER (6) ==========
  leaf1:
    hostname: leaf1
    mgmt_ip: "clab-clos02-light-leaf1"
    role: leaf
    tier: 1
    pod: 1
    device_type: linux
    loopback: "10.0.2.1/32"
    client_subnet: "192.168.1.0/24"
    interfaces:
      eth1: { peer: spine1,  peer_intf: eth1, ip: "10.1.1.2/30" }
      eth2: { peer: spine2,  peer_intf: eth1, ip: "10.1.1.10/30" }
      eth3: { peer: client1, peer_intf: eth1, ip: "192.168.1.1/24" }

  leaf2:
    hostname: leaf2
    mgmt_ip: "clab-clos02-light-leaf2"
    role: leaf
    tier: 1
    pod: 1
    device_type: linux
    loopback: "10.0.2.2/32"
    client_subnet: "192.168.2.0/24"
    interfaces:
      eth1: { peer: spine1,  peer_intf: eth2, ip: "10.1.1.6/30" }
      eth2: { peer: spine2,  peer_intf: eth2, ip: "10.1.1.14/30" }
      eth3: { peer: client2, peer_intf: eth1, ip: "192.168.2.1/24" }

  leaf3:
    hostname: leaf3
    mgmt_ip: "clab-clos02-light-leaf3"
    role: leaf
    tier: 1
    pod: 2
    device_type: linux
    loopback: "10.0.2.3/32"
    client_subnet: "192.168.3.0/24"
    interfaces:
      eth1: { peer: spine3,  peer_intf: eth1, ip: "10.1.2.2/30" }
      eth2: { peer: spine4,  peer_intf: eth1, ip: "10.1.2.10/30" }
      eth3: { peer: client3, peer_intf: eth1, ip: "192.168.3.1/24" }

  leaf4:
    hostname: leaf4
    mgmt_ip: "clab-clos02-light-leaf4"
    role: leaf
    tier: 1
    pod: 2
    device_type: linux
    loopback: "10.0.2.4/32"
    client_subnet: "192.168.4.0/24"
    interfaces:
      eth1: { peer: spine3,  peer_intf: eth2, ip: "10.1.2.6/30" }
      eth2: { peer: spine4,  peer_intf: eth2, ip: "10.1.2.14/30" }
      eth3: { peer: client4, peer_intf: eth1, ip: "192.168.4.1/24" }

  leaf5:
    hostname: leaf5
    mgmt_ip: "clab-clos02-light-leaf5"
    role: leaf
    tier: 1
    pod: 3
    device_type: linux
    loopback: "10.0.2.5/32"
    client_subnet: "192.168.5.0/24"
    interfaces:
      eth1: { peer: spine5,  peer_intf: eth1, ip: "10.1.3.2/30" }
      eth2: { peer: spine6,  peer_intf: eth1, ip: "10.1.3.10/30" }
      eth3: { peer: client5, peer_intf: eth1, ip: "192.168.5.1/24" }

  leaf6:
    hostname: leaf6
    mgmt_ip: "clab-clos02-light-leaf6"
    role: leaf
    tier: 1
    pod: 3
    device_type: linux
    loopback: "10.0.2.6/32"
    client_subnet: "192.168.6.0/24"
    interfaces:
      eth1: { peer: spine5,  peer_intf: eth2, ip: "10.1.3.6/30" }
      eth2: { peer: spine6,  peer_intf: eth2, ip: "10.1.3.14/30" }
      eth3: { peer: client6, peer_intf: eth1, ip: "192.168.6.1/24" }

  # ========== CLIENT HOSTS (6) ==========
  client1:
    hostname: client1
    mgmt_ip: "clab-clos02-light-client1"
    role: client
    tier: 0
    pod: 1
    device_type: linux_client
    interfaces:
      eth1: { peer: leaf1, peer_intf: eth3, ip: "192.168.1.10/24" }
    default_gw: "192.168.1.1"

  client2:
    hostname: client2
    mgmt_ip: "clab-clos02-light-client2"
    role: client
    tier: 0
    pod: 1
    device_type: linux_client
    interfaces:
      eth1: { peer: leaf2, peer_intf: eth3, ip: "192.168.2.10/24" }
    default_gw: "192.168.2.1"

  client3:
    hostname: client3
    mgmt_ip: "clab-clos02-light-client3"
    role: client
    tier: 0
    pod: 2
    device_type: linux_client
    interfaces:
      eth1: { peer: leaf3, peer_intf: eth3, ip: "192.168.3.10/24" }
    default_gw: "192.168.3.1"

  client4:
    hostname: client4
    mgmt_ip: "clab-clos02-light-client4"
    role: client
    tier: 0
    pod: 2
    device_type: linux_client
    interfaces:
      eth1: { peer: leaf4, peer_intf: eth3, ip: "192.168.4.10/24" }
    default_gw: "192.168.4.1"

  client5:
    hostname: client5
    mgmt_ip: "clab-clos02-light-client5"
    role: client
    tier: 0
    pod: 3
    device_type: linux_client
    interfaces:
      eth1: { peer: leaf5, peer_intf: eth3, ip: "192.168.5.10/24" }
    default_gw: "192.168.5.1"

  client6:
    hostname: client6
    mgmt_ip: "clab-clos02-light-client6"
    role: client
    tier: 0
    pod: 3
    device_type: linux_client
    interfaces:
      eth1: { peer: leaf6, peer_intf: eth3, ip: "192.168.6.10/24" }
    default_gw: "192.168.6.1"
