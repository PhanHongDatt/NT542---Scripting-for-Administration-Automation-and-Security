# ============================================================
# CLOS 5-Stage (3-Tier) Topology — Expanded
# 21 devices: 3 superspines + 6 spines + 6 leaves + 6 clients
# Documentation: http://containerlab.dev/lab-examples/min-5clos/
# ============================================================
#
# ARCHITECTURE OVERVIEW:
#
#              [superspine1]   [superspine2]   [superspine3]
#                /  |  \         /  |  \         /  |  \
#               /   |   \      /   |   \      /   |   \
#     +--------+----+----+----+----+----+----+----+----+--------+
#     |        |         |    |         |    |         |        |
#  [spine1] [spine2]  [spine3] [spine4]  [spine5] [spine6]
#    |   \   /   |      |   \   /   |      |   \   /   |
#    |    \ /    |      |    \ /    |      |    \ /    |
#  [leaf1] [leaf2]    [leaf3] [leaf4]    [leaf5] [leaf6]
#    |       |          |       |          |       |
# [client1] [client2] [client3] [client4] [client5] [client6]
#
#  |---- POD 1 ----|  |---- POD 2 ----|  |---- POD 3 ----|
#
# ============================================================

name: clos02

topology:
  kinds:
    nokia_srlinux:
      image: ghcr.io/nokia/srlinux
    linux:
      image: ghcr.io/hellt/network-multitool

  nodes:
    # ========== LEAF SWITCHES (6) ==========
    # Default type (ixrd2) — Access layer
    leaf1:
      kind: nokia_srlinux
    leaf2:
      kind: nokia_srlinux
    leaf3:
      kind: nokia_srlinux
    leaf4:
      kind: nokia_srlinux
    leaf5:
      kind: nokia_srlinux
    leaf6:
      kind: nokia_srlinux

    # ========== SPINE SWITCHES (6) ==========
    # Type ixrd3 — Aggregation layer
    spine1:
      kind: nokia_srlinux
      type: ixrd3
    spine2:
      kind: nokia_srlinux
      type: ixrd3
    spine3:
      kind: nokia_srlinux
      type: ixrd3
    spine4:
      kind: nokia_srlinux
      type: ixrd3
    spine5:
      kind: nokia_srlinux
      type: ixrd3
    spine6:
      kind: nokia_srlinux
      type: ixrd3

    # ========== SUPERSPINE SWITCHES (3) ==========
    # Type ixrd3 — Core layer
    superspine1:
      kind: nokia_srlinux
      type: ixrd3
    superspine2:
      kind: nokia_srlinux
      type: ixrd3
    superspine3:
      kind: nokia_srlinux
      type: ixrd3

    # ========== CLIENT HOSTS (6) ==========
    client1:
      kind: linux
    client2:
      kind: linux
    client3:
      kind: linux
    client4:
      kind: linux
    client5:
      kind: linux
    client6:
      kind: linux

  links:
    # ============================================================
    # POD 1: leaf1, leaf2 <-> spine1, spine2 (full mesh)
    # ============================================================
    # leaf1 uplinks
    - endpoints: ["leaf1:e1-1", "spine1:e1-1"]
    - endpoints: ["leaf1:e1-2", "spine2:e1-1"]
    # leaf2 uplinks
    - endpoints: ["leaf2:e1-1", "spine1:e1-2"]
    - endpoints: ["leaf2:e1-2", "spine2:e1-2"]

    # ============================================================
    # POD 2: leaf3, leaf4 <-> spine3, spine4 (full mesh)
    # ============================================================
    # leaf3 uplinks
    - endpoints: ["leaf3:e1-1", "spine3:e1-1"]
    - endpoints: ["leaf3:e1-2", "spine4:e1-1"]
    # leaf4 uplinks
    - endpoints: ["leaf4:e1-1", "spine3:e1-2"]
    - endpoints: ["leaf4:e1-2", "spine4:e1-2"]

    # ============================================================
    # POD 3: leaf5, leaf6 <-> spine5, spine6 (full mesh)
    # ============================================================
    # leaf5 uplinks
    - endpoints: ["leaf5:e1-1", "spine5:e1-1"]
    - endpoints: ["leaf5:e1-2", "spine6:e1-1"]
    # leaf6 uplinks
    - endpoints: ["leaf6:e1-1", "spine5:e1-2"]
    - endpoints: ["leaf6:e1-2", "spine6:e1-2"]

    # ============================================================
    # SPINE -> SUPERSPINE: Each spine connects to ALL 3 superspines
    # This is the key to full CLOS — any-to-any reachability
    # ============================================================

    # --- spine1 (POD1) uplinks to all superspines ---
    - endpoints: ["spine1:e1-3", "superspine1:e1-1"]
    - endpoints: ["spine1:e1-4", "superspine2:e1-1"]
    - endpoints: ["spine1:e1-5", "superspine3:e1-1"]

    # --- spine2 (POD1) uplinks to all superspines ---
    - endpoints: ["spine2:e1-3", "superspine1:e1-2"]
    - endpoints: ["spine2:e1-4", "superspine2:e1-2"]
    - endpoints: ["spine2:e1-5", "superspine3:e1-2"]

    # --- spine3 (POD2) uplinks to all superspines ---
    - endpoints: ["spine3:e1-3", "superspine1:e1-3"]
    - endpoints: ["spine3:e1-4", "superspine2:e1-3"]
    - endpoints: ["spine3:e1-5", "superspine3:e1-3"]

    # --- spine4 (POD2) uplinks to all superspines ---
    - endpoints: ["spine4:e1-3", "superspine1:e1-4"]
    - endpoints: ["spine4:e1-4", "superspine2:e1-4"]
    - endpoints: ["spine4:e1-5", "superspine3:e1-4"]

    # --- spine5 (POD3) uplinks to all superspines ---
    - endpoints: ["spine5:e1-3", "superspine1:e1-5"]
    - endpoints: ["spine5:e1-4", "superspine2:e1-5"]
    - endpoints: ["spine5:e1-5", "superspine3:e1-5"]

    # --- spine6 (POD3) uplinks to all superspines ---
    - endpoints: ["spine6:e1-3", "superspine1:e1-6"]
    - endpoints: ["spine6:e1-4", "superspine2:e1-6"]
    - endpoints: ["spine6:e1-5", "superspine3:e1-6"]

    # ============================================================
    # CLIENT -> LEAF: Each client connects to one leaf
    # ============================================================
    - endpoints: ["client1:eth1", "leaf1:e1-3"]
    - endpoints: ["client2:eth1", "leaf2:e1-3"]
    - endpoints: ["client3:eth1", "leaf3:e1-3"]
    - endpoints: ["client4:eth1", "leaf4:e1-3"]
    - endpoints: ["client5:eth1", "leaf5:e1-3"]
    - endpoints: ["client6:eth1", "leaf6:e1-3"]
