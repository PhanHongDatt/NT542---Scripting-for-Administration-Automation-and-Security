# ============================================================
# CLOS 5-Stage (3-Tier) Topology — LIGHTWEIGHT (FIXED)
# 21 devices: 3 superspines + 6 spines + 6 leaves + 6 clients
# All nodes use kind: linux to satisfy Containerlab validation
# ============================================================

name: clos02-light

topology:
  kinds:
    linux:
      # Default image for anything marked as 'linux'
      image: frrouting/frr:latest

  nodes:
    # ========== LEAF SWITCHES (6) ==========
    leaf1: { kind: linux }
    leaf2: { kind: linux }
    leaf3: { kind: linux }
    leaf4: { kind: linux }
    leaf5: { kind: linux }
    leaf6: { kind: linux }

    # ========== SPINE SWITCHES (6) ==========
    spine1: { kind: linux }
    spine2: { kind: linux }
    spine3: { kind: linux }
    spine4: { kind: linux }
    spine5: { kind: linux }
    spine6: { kind: linux }

    # ========== SUPERSPINE SWITCHES (3) ==========
    superspine1: { kind: linux }
    superspine2: { kind: linux }
    superspine3: { kind: linux }

    # ========== CLIENT HOSTS (6) ==========
    # Overriding the default FRR image with the lighter multitool
    client1: { kind: linux, image: ghcr.io/hellt/network-multitool }
    client2: { kind: linux, image: ghcr.io/hellt/network-multitool }
    client3: { kind: linux, image: ghcr.io/hellt/network-multitool }
    client4: { kind: linux, image: ghcr.io/hellt/network-multitool }
    client5: { kind: linux, image: ghcr.io/hellt/network-multitool }
    client6: { kind: linux, image: ghcr.io/hellt/network-multitool }

  links:
    # --- POD 1 ---
    - endpoints: ["leaf1:eth1", "spine1:eth1"]
    - endpoints: ["leaf1:eth2", "spine2:eth1"]
    - endpoints: ["leaf2:eth1", "spine1:eth2"]
    - endpoints: ["leaf2:eth2", "spine2:eth2"]

    # --- POD 2 ---
    - endpoints: ["leaf3:eth1", "spine3:eth1"]
    - endpoints: ["leaf3:eth2", "spine4:eth1"]
    - endpoints: ["leaf4:eth1", "spine3:eth2"]
    - endpoints: ["leaf4:eth2", "spine4:eth2"]

    # --- POD 3 ---
    - endpoints: ["leaf5:eth1", "spine5:eth1"]
    - endpoints: ["leaf5:eth2", "spine6:eth1"]
    - endpoints: ["leaf6:eth1", "spine5:eth2"]
    - endpoints: ["leaf6:eth2", "spine6:eth2"]

    # --- SPINE -> SUPERSPINE ---
    - endpoints: ["spine1:eth3", "superspine1:eth1"]
    - endpoints: ["spine1:eth4", "superspine2:eth1"]
    - endpoints: ["spine1:eth5", "superspine3:eth1"]

    - endpoints: ["spine2:eth3", "superspine1:eth2"]
    - endpoints: ["spine2:eth4", "superspine2:eth2"]
    - endpoints: ["spine2:eth5", "superspine3:eth2"]

    - endpoints: ["spine3:eth3", "superspine1:eth3"]
    - endpoints: ["spine3:eth4", "superspine2:eth3"]
    - endpoints: ["spine3:eth5", "superspine3:eth3"]

    - endpoints: ["spine4:eth3", "superspine1:eth4"]
    - endpoints: ["spine4:eth4", "superspine2:eth4"]
    - endpoints: ["spine4:eth5", "superspine3:eth4"]

    - endpoints: ["spine5:eth3", "superspine1:eth5"]
    - endpoints: ["spine5:eth4", "superspine2:eth5"]
    - endpoints: ["spine5:eth5", "superspine3:eth5"]

    - endpoints: ["spine6:eth3", "superspine1:eth6"]
    - endpoints: ["spine6:eth4", "superspine2:eth6"]
    - endpoints: ["spine6:eth5", "superspine3:eth6"]

    # --- CLIENT -> LEAF ---
    - endpoints: ["client1:eth1", "leaf1:eth3"]
    - endpoints: ["client2:eth1", "leaf2:eth3"]
    - endpoints: ["client3:eth1", "leaf3:eth3"]
    - endpoints: ["client4:eth1", "leaf4:eth3"]
    - endpoints: ["client5:eth1", "leaf5:eth3"]
    - endpoints: ["client6:eth1", "leaf6:eth3"]