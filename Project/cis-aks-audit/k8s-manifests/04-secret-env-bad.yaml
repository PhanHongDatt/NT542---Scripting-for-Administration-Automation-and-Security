# ============================================================================
# 04-secret-env-bad.yaml
# Secret + Pod dùng env var để inject secret - VI PHẠM control 4.5.1
#
# Tại sao "xấu"?
#   - Env vars có thể bị leak qua:
#     * kubectl describe pod (hiển thị env)
#     * crash dumps / core files
#     * child processes kế thừa env
#     * logging framework ghi lại env
#
# Cách đúng: mount secret làm file vào /etc/secrets/ - chỉ process
# có quyền đọc file mới truy cập được.
# ============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  namespace: dev
  labels:
    audit-test: "true"
type: Opaque
data:
  # password123 base64-encoded
  password: cGFzc3dvcmQxMjM=
  # db_user base64-encoded
  username: ZGJfdXNlcg==
---
apiVersion: v1
kind: Pod
metadata:
  name: app-with-env-secret
  namespace: dev
  labels:
    audit-compliance: "fail"
    purpose: audit-test-violation
spec:
  containers:
    - name: app
      image: busybox:1.36
      command: ["sh", "-c", "sleep 3600"]
      # VI PHẠM 4.5.1: inject secret qua env var
      env:
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: password
        - name: DB_USERNAME
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: username
      securityContext:
        allowPrivilegeEscalation: false
        runAsNonRoot: true
        runAsUser: 1000
      resources:
        limits:
          memory: "64Mi"
          cpu: "100m"
